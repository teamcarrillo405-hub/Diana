apiVersion: v1
kind: Secret
metadata:
  name: diana-worker-metrics-token
type: Opaque
stringData:
  token: replace-with-worker-api-token
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: diana-worker-api
spec:
  endpoints:
    - interval: 30s
      path: /api/workers/metrics/prometheus
      params:
        windowMinutes:
          - "15"
      scheme: https
      bearerTokenSecret:
        name: diana-worker-metrics-token
        key: token
  namespaceSelector:
    matchNames:
      - production
  selector:
    matchLabels:
      app.kubernetes.io/name: diana-web
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: diana-worker-alerts
spec:
  groups:
    - name: diana-worker
      rules:
        - alert: DianaWorkerQueueBacklog
          expr: sum(diana_worker_jobs_total{queue="student-ai-candidate",status="queued"}) > 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Diana worker queue backlog is growing
            description: More than 50 student-ai-candidate jobs have been queued for 10 minutes.
        - alert: DianaWorkerRunningLeaseBacklog
          expr: sum(diana_worker_jobs_total{queue="student-ai-candidate",status="running"}) > 25
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Diana worker running lease count is elevated
            description: Running worker leases are elevated long enough to indicate slow completions or stuck workers.
        - alert: DianaWorkerHighRetryCount
          expr: sum(diana_worker_retries_total{queue="student-ai-candidate"}) > 20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Diana worker retry count is elevated
            description: Worker retry attempts crossed the alert threshold in the selected metrics window.
        - alert: DianaWorkerTenantErrors
          expr: sum(diana_worker_tenants_with_errors{queue="student-ai-candidate"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Diana worker tenant errors detected
            description: One or more tenants have worker errors in the selected metrics window.
