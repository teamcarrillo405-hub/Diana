apiVersion: v1
kind: Secret
metadata:
  name: diana-worker-secrets
type: Opaque
stringData:
  WORKER_API_TOKEN: replace-with-strong-shared-worker-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diana-worker-config
data:
  DIANA_WORKER_BASE_URL: https://your-diana-app.example
  DIANA_WORKER_QUEUE: student-ai-candidate
  OPENJARVIS_BASE_URL: http://openjarvis:8000
  OPENJARVIS_MODEL: llama3.2:3b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diana-worker
  labels:
    app.kubernetes.io/name: diana-worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: diana-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: diana-worker
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 75
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: diana-worker
      containers:
        - name: diana-worker
          image: ghcr.io/teamcarrillo405-hub/diana/diana-worker:replace-with-sha
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: diana-worker-config
            - secretRef:
                name: diana-worker-secrets
          env:
            - name: DIANA_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - node
          args:
            - dist/worker/run-diana-worker.cjs
            - --poll-ms=1000
            - --lease-seconds=60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            exec:
              command:
                - node
                - dist/worker/run-diana-worker.cjs
                - --health
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - node
                - dist/worker/run-diana-worker.cjs
                - --health
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: diana-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: diana-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: diana-worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: diana-worker
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: diana-worker-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: diana-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: diana-web
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openjarvis
      ports:
        - protocol: TCP
          port: 8000
    # Keep this only when DIANA_WORKER_BASE_URL points to an external HTTPS
    # origin instead of an in-cluster Diana service.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
