apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: diana-worker-queue-depth
spec:
  scaleTargetRef:
    name: diana-worker
  minReplicaCount: 2
  maxReplicaCount: 50
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: diana_worker_queued_jobs
        threshold: "10"
        query: sum(diana_worker_jobs_total{queue="student-ai-candidate",status="queued"})
