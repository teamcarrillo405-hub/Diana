name: Native builds

# Manual dispatch: produces an installable Android debug APK and an unsigned
# iOS simulator build as artifacts. Store-signed release builds need the
# developer-account secrets documented in docs/NATIVE_BUILD.md.
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: diana-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ios:
    runs-on: macos-14
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor (runs pod install)
        run: npx cap sync ios

      - name: Build for simulator (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: diana-ios-simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 14
