name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build-time placeholders — real values live in Vercel. Client pages
      # only embed these; no network calls happen during build.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Tone audit (calm invariant)
        run: npm run tone-audit

      - name: Launch audit
        run: npm run launch-audit

      - name: Production build
        run: npm run build
