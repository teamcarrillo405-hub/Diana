<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a1024"/>
    <circle cx="50" cy="50" r="26" fill="#29d0ff" opacity="0.16"/>
    <path d="M50 32 L58 46 L50 46 L58 68 L42 50 L50 50 Z" fill="#29d0ff"/>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&amp;family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,800&amp;display=swap" rel="stylesheet">
<style>html,body{margin:0;background:#04060f;}*{box-sizing:border-box;}
@keyframes ibp-shimmer{0%{opacity:.35}50%{opacity:.9}100%{opacity:.35}}</style>
</helmet>

<div style="width:390px;height:844px;position:relative;overflow:hidden;background:#04060f;font-family:'Barlow Semi Condensed',sans-serif;color:#fff;display:flex;flex-direction:column">

  <div style="display:flex;align-items:center;justify-content:space-between;height:42px;padding:0 16px;font-family:'Saira Condensed',sans-serif;font-weight:700;flex-shrink:0">
    <span style="font-size:14px">9:41</span>
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="17" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1" opacity=".5"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="2.5" stroke="#fff" stroke-opacity=".6"/><rect x="3" y="3" width="13" height="6" rx="1" fill="#fff"/></svg>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 16px;flex-shrink:0;border-bottom:1px solid rgba(41,208,255,.14)">
    <div style="display:flex;align-items:center;gap:9px">
      <div style="width:26px;height:26px;border-radius:8px;background:rgba(120,150,220,.14);display:flex;align-items:center;justify-content:center;color:#cdd6f2;cursor:pointer">←</div>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-style:italic;font-size:19px;letter-spacing:.05em;text-transform:uppercase">Inbox</span>
    </div>
    <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#29d0ff,#1a6cff);display:flex;align-items:center;justify-content:center;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;color:#04080f">G</div>
  </div>

  <div style="flex:1;overflow:auto;padding:14px 16px 20px">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="4">
      <div style="border-radius:13px;border:1px solid {{ it.border }};background:rgba(4,8,20,.72);padding:13px 14px;margin-bottom:10px">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="width:28px;height:28px;border-radius:8px;background:rgba(120,150,220,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#aab8e0">
            <sc-if value="{{ it.isVoice }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path></svg></sc-if>
            <sc-if value="{{ it.isPhoto }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></sc-if>
            <sc-if value="{{ it.isText }}" hint-placeholder-val="{{ true }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"></path></svg></sc-if>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13.5px;color:#eaf0ff;line-height:1.4">{{ it.raw }}</div>
            <sc-if value="{{ it.isUnclassified }}" hint-placeholder-val="{{ false }}">
              <div style="display:flex;align-items:center;gap:7px;margin-top:8px">
                <span style="width:6px;height:6px;border-radius:50%;background:#29d0ff;animation:ibp-shimmer 1.6s ease-in-out infinite"></span>
                <span style="font-size:12px;color:rgba(200,218,255,.6)">Diana's reading it…</span>
              </div>
            </sc-if>
            <sc-if value="{{ it.isClassified }}" hint-placeholder-val="{{ true }}">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:9px">
                <span style="padding:4px 9px;border-radius:6px;background:{{ it.clsBg }};border:1px solid {{ it.clsBorder }};font-size:11px;font-weight:600;color:{{ it.clsFg }}">{{ it.cls }}</span>
                <span style="padding:4px 9px;border-radius:6px;background:rgba(120,150,220,.08);font-size:11px;font-weight:600;color:#cdd6f2">{{ it.kind }}</span>
                <span style="padding:4px 9px;border-radius:6px;background:rgba(120,150,220,.08);font-size:11px;font-weight:600;color:#cdd6f2">{{ it.due }}</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;margin-top:11px">
                <div onClick="{{ it.onConfirm }}" style="padding:8px 15px;border-radius:8px;background:#29d0ff;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:#04080f">Add to Work</div>
                <div onClick="{{ it.onDismiss }}" style="margin-left:auto;font-size:12px;color:#7d88ad">Dismiss</div>
              </div>
            </sc-if>
          </div>
        </div>
      </div>
    </sc-for>

    <sc-if value="{{ hasNoItems }}" hint-placeholder-val="{{ false }}">
      <div style="border-radius:13px;border:1px dashed rgba(120,150,220,.18);padding:40px 20px;text-align:center;margin-top:20px">
        <div style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-style:italic;font-size:19px;text-transform:uppercase;color:#cdd6f2">Nothing captured</div>
        <p style="margin:8px 0 0;font-size:13px;line-height:1.5;color:rgba(200,218,255,.6)">Snap a photo, or type it out — Diana will sort it.</p>
      </div>
    </sc-if>
  </div>

  <div style="flex-shrink:0;height:64px;display:flex;align-items:center;justify-content:space-around;background:rgba(2,5,14,.92);border-top:1px solid rgba(41,208,255,.18);backdrop-filter:blur(20px);padding-bottom:6px">
    <a href="Student Lobby Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v10h14V10"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Today</span>
    </a>
    <a href="Work Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Work</span>
    </a>
    <a href="Classes Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Classes</span>
    </a>
    <a href="Calendar Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Calendar</span>
    </a>
    <a href="More Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="19" cy="12" r="1.6"></circle></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">More</span>
    </a>
  </div>

</div>
<dc-import name="Agent Fab" bottom="96" hint-size="64px,64px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  state = { dismissed: {} };
  dismiss = (id) => this.setState((s) => ({ dismissed: { ...s.dismissed, [id]: true } }));

  DATA() {
    return [
      { id: 1, raw: '"Test Friday over Ch. 5 and 6, bring calculator"', mode: 'voice', status: 'unclassified' },
      { id: 2, raw: 'Worksheet pg. 42, all problems', mode: 'photo', status: 'classified', cls: 'Math', clsColor: '#29d0ff', kind: 'Problem set', due: 'Due tomorrow' },
      { id: 3, raw: 'Read the article on civil rights for class discussion', mode: 'text', status: 'classified', cls: 'History', clsColor: '#ffd24a', kind: 'Reading', due: 'Due in 3 days' },
      { id: 4, raw: 'Lab safety quiz — review the handout before Thursday', mode: 'photo', status: 'classified', cls: 'Science', clsColor: '#36e07a', kind: 'Test prep', due: 'Due Thu' },
    ];
  }

  renderVals() {
    const st = this.state;
    const visible = this.DATA().filter((d) => !st.dismissed[d.id]);
    const tint = (hex, a) => {
      const map = { '#29d0ff': `rgba(41,208,255,${a})`, '#ffd24a': `rgba(255,210,74,${a})`, '#36e07a': `rgba(54,224,122,${a})` };
      return map[hex] || `rgba(120,150,220,${a})`;
    };
    const items = visible.map((d) => ({
      ...d,
      border: d.status === 'unclassified' ? 'rgba(120,150,220,.18)' : 'rgba(41,208,255,.18)',
      isVoice: d.mode === 'voice', isPhoto: d.mode === 'photo', isText: d.mode === 'text',
      isUnclassified: d.status === 'unclassified', isClassified: d.status === 'classified',
      clsBg: d.clsColor ? tint(d.clsColor, 0.1) : '', clsBorder: d.clsColor ? tint(d.clsColor, 0.3) : '', clsFg: d.clsColor,
      onConfirm: () => this.dismiss(d.id), onDismiss: () => this.dismiss(d.id),
    }));
    return { items, hasNoItems: items.length === 0 };
  }
}
</script>
</body>
</html>
