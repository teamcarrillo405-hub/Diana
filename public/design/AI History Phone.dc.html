<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a1024"/>
    <circle cx="50" cy="50" r="26" fill="#29d0ff" opacity="0.16"/>
    <path d="M50 32 L58 46 L50 46 L58 68 L42 50 L50 50 Z" fill="#29d0ff"/>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&amp;family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,700;1,800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --gl-bg-base:#04060f; --gl-bg-card:rgba(4,8,20,.72);
    --gl-cyan:#29d0ff; --gl-cyan-30:rgba(41,208,255,.3); --gl-cyan-14:rgba(41,208,255,.14);
    --gl-green:#36e07a; --gl-green-30:rgba(54,224,122,.3); --gl-green-14:rgba(54,224,122,.14);
    --gl-text-primary:#fff; --gl-text-secondary:#cdd6f2; --gl-text-muted:#aab8e0; --gl-text-dim:#7d88ad;
    --gl-border:rgba(120,150,220,.18);
    --font-display:'Saira Condensed',sans-serif; --font-body:'Barlow Semi Condensed',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  html,body{margin:0;background:var(--gl-bg-base);}*{box-sizing:border-box;}

  *::-webkit-scrollbar{width:0 !important;height:0 !important;display:none !important;}
  *{scrollbar-width:none;}
</style>
</helmet>

<div style="width:390px;height:844px;font-family:var(--font-body);color:var(--gl-text-primary);background:var(--gl-bg-base);display:flex;flex-direction:column;overflow:hidden" data-screen-label="AI History Phone">
  <div style="height:47px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:14px;font-weight:600">
    <span>9:41</span><div style="display:flex;align-items:center;gap:6px"><svg width="17" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"></rect><rect x="5" y="4" width="3" height="8" rx="1"></rect><rect x="10" y="1.5" width="3" height="10.5" rx="1"></rect></svg><svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity=".5"></rect><rect x="2" y="2" width="18" height="8" rx="2" fill="#fff"></rect><rect x="23" y="4" width="2" height="4" rx="1" fill="#fff" fill-opacity=".5"></rect></svg></div>
  </div>

  <div style="padding:4px 18px 10px;flex-shrink:0">
    <div style="font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gl-cyan)">AI History</div>
    <div style="font-family:var(--font-display);font-style:italic;font-weight:800;font-size:20px;text-transform:uppercase">Every AI call, in the open.</div>
  </div>

  <div style="flex-shrink:0;display:flex;gap:7px;padding:0 18px 10px;overflow-x:auto">
    <sc-for list="{{ featureFilters }}" as="f" hint-placeholder-count="6">
      <div onClick="{{ f.onClick }}" style="flex-shrink:0;white-space:nowrap;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid {{ f.border }};background:{{ f.bg }};color:{{ f.fg }}">{{ f.label }}</div>
    </sc-for>
  </div>

  <div style="flex:1;overflow-y:auto;padding:0 18px 30px;display:flex;flex-direction:column;gap:9px">
    <sc-for list="{{ rows }}" as="r" hint-placeholder-count="6">
      <div style="border-radius:12px;border:1px solid var(--gl-border);background:var(--gl-bg-card);padding:13px 15px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;background:{{ r.featureBg }};color:{{ r.featureColor }}">{{ r.featureLabel }}</div>
          <div style="font-size:11px;color:var(--gl-text-dim);font-family:var(--font-mono)">{{ r.dateLabel }}</div>
        </div>
        <div style="font-size:13px;color:var(--gl-text-secondary);line-height:1.4">{{ r.promptSummary }}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <sc-if value="{{ r.assignmentTitle }}" hint-placeholder-val="{{ false }}">
            <div style="font-size:11px;color:var(--gl-text-dim)">on {{ r.assignmentTitle }}</div>
          </sc-if>
          <div style="font-size:12px;font-family:var(--font-mono);color:var(--gl-cyan);margin-left:auto">{{ r.tokensLabel }} tok</div>
        </div>
      </div>
    </sc-for>
  </div>

  <div style="flex-shrink:0;padding:12px 18px;border-top:1px solid var(--gl-border);background:rgba(4,8,20,.9)">
    <div onClick="{{ onExportCsv }}" style="text-align:center;padding:11px;border-radius:10px;font-family:var(--font-display);font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;background:var(--gl-cyan-14);color:var(--gl-cyan);border:1px solid var(--gl-cyan-30)">⬇ Export CSV</div>
    <sc-if value="{{ exportMessage }}" hint-placeholder-val="{{ false }}">
      <div style="margin-top:8px;font-size:11.5px;color:var(--gl-green);text-align:center">{{ exportMessage }}</div>
    </sc-if>
  </div>

  <div style="flex-shrink:0;height:60px;display:flex;align-items:center;justify-content:space-around;background:rgba(2,5,14,.92);border-top:1px solid rgba(41,208,255,.18);backdrop-filter:blur(20px)">
    <a href="Student Lobby Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#5a648a"><div style="font-size:17px">⌂</div><div style="font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase">Today</div></a>
    <a href="Work Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#5a648a"><div style="font-size:17px">▤</div><div style="font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase">Work</div></a>
    <a href="Classes Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#5a648a"><div style="font-size:17px">▦</div><div style="font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase">Classes</div></a>
    <a href="More Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#29d0ff"><div style="font-size:17px">•••</div><div style="font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase">More</div></a>
  </div>
</div>

<dc-import name="Agent Fab" bottom="96" hint-size="64px,64px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  FEATURE_TINT = {
    'AI Help': ['rgba(41,208,255,.14)', 'var(--gl-cyan)'], 'Co-write': ['rgba(167,139,250,.14)', '#a78bfa'],
    'Study artifacts': ['rgba(255,210,74,.14)', '#ffd24a'], 'Take the test': ['rgba(54,224,122,.14)', 'var(--gl-green)'],
    'Flashcards': ['rgba(41,208,255,.14)', 'var(--gl-cyan)'], 'Visual tools': ['rgba(167,139,250,.14)', '#a78bfa'],
  };

  state = {
    filter: 'all', exportMessage: '',
    rows: [
      { id: '1', created_at: '2027-05-14T09:12:00Z', feature: 'AI Help', assignment_title: 'DBQ: Reconstruction essay', prompt_summary: 'Break down thesis-writing steps for a history DBQ', tokens_used: 612 },
      { id: '2', created_at: '2027-05-14T08:40:00Z', feature: 'Co-write', assignment_title: 'Personal narrative draft', prompt_summary: 'Suggest structure for a 5-paragraph narrative essay', tokens_used: 1180 },
      { id: '3', created_at: '2027-05-13T21:05:00Z', feature: 'Study artifacts', assignment_title: 'Unit 4 Chemistry', prompt_summary: 'Generate a practice test from chapter 7 notes', tokens_used: 2140 },
      { id: '4', created_at: '2027-05-13T19:30:00Z', feature: 'Flashcards', assignment_title: null, prompt_summary: 'Create flashcards from Spanish vocabulary list', tokens_used: 480 },
      { id: '5', created_at: '2027-05-12T16:02:00Z', feature: 'Take the test', assignment_title: 'Bio midterm review', prompt_summary: 'Explain why an MCQ answer was incorrect', tokens_used: 340 },
      { id: '6', created_at: '2027-05-12T14:18:00Z', feature: 'Visual tools', assignment_title: 'WWII causes', prompt_summary: 'Build a timeline of events leading to WWII', tokens_used: 890 },
    ],
  };

  renderVals() {
    const s = this.state;
    const features = ['all', ...new Set(s.rows.map(r => r.feature))];
    const featureFilters = features.map(f => ({
      label: f === 'all' ? 'All' : f,
      border: s.filter === f ? 'var(--gl-cyan-30)' : 'var(--gl-border)',
      bg: s.filter === f ? 'var(--gl-cyan-14)' : 'rgba(4,8,20,.4)',
      fg: s.filter === f ? 'var(--gl-cyan)' : 'var(--gl-text-muted)',
      onClick: () => this.setState({ filter: f }),
    }));
    const filtered = s.filter === 'all' ? s.rows : s.rows.filter(r => r.feature === s.filter);
    const rows = filtered.map(r => {
      const d = new Date(r.created_at);
      const dateLabel = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const [bg, color] = this.FEATURE_TINT[r.feature] || ['rgba(41,208,255,.14)', 'var(--gl-cyan)'];
      return { ...r, dateLabel, featureLabel: r.feature, featureBg: bg, featureColor: color, assignmentTitle: r.assignment_title, promptSummary: r.prompt_summary, tokensLabel: r.tokens_used.toLocaleString() };
    });
    return {
      featureFilters, rows, exportMessage: s.exportMessage,
      onExportCsv: () => this.setState({ exportMessage: `Exported ${s.rows.length} interactions.` }),
    };
  }
}

</script>
</body>
</html>
