<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a1024"/>
    <circle cx="50" cy="50" r="26" fill="#29d0ff" opacity="0.16"/>
    <path d="M50 32 L58 46 L50 46 L58 68 L42 50 L50 50 Z" fill="#29d0ff"/>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&amp;family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,700;1,800&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --gl-bg-base:#04060f; --gl-bg-card:rgba(4,8,20,.72);
    --gl-cyan:#29d0ff; --gl-cyan-30:rgba(41,208,255,.3); --gl-cyan-18:rgba(41,208,255,.18); --gl-cyan-14:rgba(41,208,255,.14); --gl-cyan-25:rgba(41,208,255,.25);
    --gl-purple:#b09cff; --gl-green:#36e07a; --gl-gold:#ffd24a;
    --gl-text-primary:#fff; --gl-text-muted:#aab8e0; --gl-text-dim:#7d88ad; --gl-text-overlay-60:rgba(200,218,255,.6);
    --gl-border:rgba(120,150,220,.18); --gl-bg-input:rgba(10,16,36,.8);
    --font-display:'Saira Condensed',sans-serif; --font-body:'Barlow Semi Condensed',sans-serif;
  }
  html,body{margin:0;background:var(--gl-bg-base);}*{box-sizing:border-box;}
  a{text-decoration:none;color:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(120,150,220,.3);border-radius:4px}
  ::placeholder{color:var(--gl-text-dim)}
</style>
</helmet>

<div style="width:100%;min-height:100vh;font-family:var(--font-body);color:var(--gl-text-primary);background:radial-gradient(1200px 600px at 80% -5%,rgba(41,208,255,.05),transparent 60%),var(--gl-bg-base)" data-screen-label="Search">

  <!-- APP NAV -->
  <div style="position:relative;z-index:30;max-width:1440px;margin:0 auto;height:58px;display:flex;align-items:center;gap:22px;padding:0 22px;background:rgba(2,5,14,.72);border-bottom:1px solid rgba(41,208,255,.18);backdrop-filter:blur(20px)">
    <div style="display:flex;gap:8px">
      <a href="More.dc.html" title="More tools" style="text-decoration:none;width:34px;height:34px;border-radius:8px;background:rgba(120,150,220,.12);display:flex;align-items:center;justify-content:center;font-size:15px;color:#aab8e0">▦</a>
      <a href="Search.dc.html" title="Search" style="text-decoration:none;width:34px;height:34px;border-radius:8px;background:rgba(41,208,255,.14);border:1px solid rgba(41,208,255,.28);display:flex;align-items:center;justify-content:center;font-size:14px;color:#29d0ff">⌕</a>
    </div>
    <div style="display:flex;align-items:center;gap:26px;margin-left:6px;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase">
      <a href="Student Lobby.dc.html" style="display:inline-block;text-decoration:none;color:#8b96bd;cursor:pointer">Today</a>
      <a href="Work.dc.html" style="display:inline-block;text-decoration:none;color:#8b96bd;cursor:pointer">Work</a>
      <a href="Classes.dc.html" style="display:inline-block;text-decoration:none;color:#8b96bd;cursor:pointer">Classes</a>
      <a href="Calendar.dc.html" style="display:inline-block;text-decoration:none;color:#8b96bd;cursor:pointer">Calendar</a>
      <a href="Messages.dc.html" style="display:inline-block;text-decoration:none;color:#8b96bd;cursor:pointer">Messages</a>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:16px">
      <a href="Quick Add.dc.html" style="text-decoration:none;display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;background:rgba(41,208,255,.14);border:1px solid rgba(41,208,255,.28);cursor:pointer;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.06em;text-transform:uppercase;color:#29d0ff"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>Capture</a>
      <a href="Quick Add.dc.html?mode=voice" style="text-decoration:none;display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:8px;cursor:pointer;border:1.5px solid rgba(220,38,38,1);background:rgba(220,38,38,1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        <span style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.08em;color:#ffffff">RECORD</span>
      </a>
      <a href="Settings.dc.html" style="text-decoration:none;width:36px;height:36px;border-radius:50%;border:2px solid rgba(41,208,255,.38);flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,#29d0ff,#1a6cff);display:flex;align-items:center;justify-content:center" title="Profile & settings">
          <sc-if value="{{ isAvatarUpload }}" hint-placeholder-val="{{ false }}">
            <sc-if value="{{ hasProfilePhoto }}" hint-placeholder-val="{{ false }}">
              <img src="{{ profilePhotoSrc }}" style="width:100%;height:100%;object-fit:cover;object-position:{{ photoObjectPosition }}" alt="You">
            </sc-if>
          </sc-if>
          <sc-if value="{{ isAvatarBoy }}" hint-placeholder-val="{{ false }}">
            <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="50" fill="#0a3348"></circle><circle cx="50" cy="40" r="17" fill="#bfe6ff"></circle><path d="M50 57c-20 0-33 13-33 29v6h66v-6c0-16-13-29-33-29z" fill="#bfe6ff"></path><path d="M33 33c0-11 8-19 17-19s17 8 17 19c-3-5-10-8-17-8s-14 3-17 8z" fill="#0d1f2e"></path></svg>
          </sc-if>
          <sc-if value="{{ isAvatarGirl }}" hint-placeholder-val="{{ false }}">
            <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="50" fill="#2a1f42"></circle><circle cx="50" cy="40" r="17" fill="#e3d4ff"></circle><path d="M50 57c-20 0-33 13-33 29v6h66v-6c0-16-13-29-33-29z" fill="#e3d4ff"></path><path d="M31 40c-1-15 8-27 19-27s20 12 19 27c-1-9-9-15-19-15s-18 6-19 15z" fill="#2c1a44"></path><path d="M29 40c-2 9-1 19 3 26 1-11 0-20 2-26z" fill="#2c1a44"></path><path d="M71 40c2 9 1 19-3 26-1-11 0-20-2-26z" fill="#2c1a44"></path></svg>
          </sc-if>
          <sc-if value="{{ showInitialsFallback }}" hint-placeholder-val="{{ true }}">
            <span style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:14px;color:#04080f">{{ initials }}</span>
          </sc-if>
      </a>
    </div>
  </div>

  <div style="max-width:1440px;margin:0 auto;padding:44px 34px 70px">
    <div style="font-family:var(--font-display);font-weight:700;font-size:12.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--gl-cyan);margin-bottom:8px">Search</div>
    <div style="font-family:var(--font-display);font-style:italic;font-weight:800;font-size:34px;text-transform:uppercase;margin-bottom:20px">Find anything in Diana.</div>

    <!-- Search input -->
    <div style="position:relative;margin-bottom:10px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gl-text-dim)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:18px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input value="{{ query }}" onInput="{{ setQuery }}" placeholder="Search pages, tools, assignments…" autofocus="autofocus" style="width:100%;padding:16px 18px 16px 50px;border-radius:13px;background:var(--gl-bg-input);border:1px solid {{ inputBorder }};color:#fff;font-size:17px;font-family:var(--font-body);outline:none"></input>
    </div>
    <div style="font-size:13px;color:var(--gl-text-dim);margin-bottom:26px">{{ resultCountLabel }}</div>

    <!-- Results, grouped -->
    <sc-for list="{{ groups }}" as="grp" hint-placeholder-count="4">
      <div style="margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:{{ grp.color }}">{{ grp.title }}</div>
          <div style="flex:1;height:1px;background:var(--gl-border)"></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
          <sc-for list="{{ grp.items }}" as="it" hint-placeholder-count="4">
            <a href="{{ it.href }}" style="display:block;border-radius:13px;border:1px solid var(--gl-border);background:var(--gl-bg-card);padding:16px 17px;transition:transform .15s,border-color .15s" style-hover="transform:translateY(-2px);border-color:var(--gl-cyan-30)">
              <div style="font-family:var(--font-display);font-weight:700;font-size:15px;color:#fff">{{ it.name }}</div>
              <div style="font-size:12px;color:var(--gl-text-overlay-60);margin-top:4px;line-height:1.4">{{ it.desc }}</div>
            </a>
          </sc-for>
        </div>
      </div>
    </sc-for>

    <!-- Empty state -->
    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
      <div style="border-radius:14px;border:1px dashed var(--gl-border);background:rgba(4,8,20,.35);padding:44px 28px;text-align:center">
        <div style="font-family:var(--font-display);font-weight:800;font-style:italic;font-size:22px;text-transform:uppercase;color:var(--gl-text-muted)">No matches for "{{ query }}"</div>
        <p style="margin:8px auto 0;max-width:420px;font-size:13.5px;color:var(--gl-text-overlay-60)">Try a class name, a tool ("flashcards", "focus"), or clear the search to browse everything.</p>
      </div>
    </sc-if>
  </div>
</div>
<dc-import name="Agent Fab" hint-size="64px,64px" style="position:fixed;right:26px;bottom:26px;z-index:999"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: '' };
  setQuery = (e) => this.setState({ query: e.target.value });

  DIR() {
    return [
      { title: 'Go to', color: 'var(--gl-cyan)', items: [
        { name: 'Today', href: 'Student Lobby.dc.html', desc: 'Your lobby — next move, energy, classes', kw: 'today lobby home dashboard next move energy' },
        { name: 'Work', href: 'Work.dc.html', desc: 'Ranked assignment queue', kw: 'work mission board assignments queue tasks' },
        { name: 'Classes', href: 'Classes.dc.html', desc: 'Every class, one look', kw: 'classes subjects courses' },
        { name: 'Calendar', href: 'Calendar.dc.html', desc: 'Month and agenda view', kw: 'calendar schedule dates month agenda' },
        { name: 'Messages', href: 'Messages.dc.html', desc: 'Teachers, parents, Diana', kw: 'messages inbox chat teachers parents' },
        { name: 'Settings', href: 'Settings.dc.html', desc: 'Profile, accessibility, tools, account', kw: 'settings preferences accessibility account profile' },
      ]},
      { title: 'Do the work', color: 'var(--gl-cyan)', items: [
        { name: 'Assignment', href: 'Homework Mission.dc.html', desc: 'One page to do the homework', kw: 'assignment detail cockpit prompt' },
        { name: 'New assignment', href: 'Quick Add.dc.html?mode=assignment', desc: 'Snap it, tag the class, set the date', kw: 'new assignment add create manual' },
        { name: 'Quick add', href: 'Quick Add.dc.html', desc: 'Capture by text, photo, or voice', kw: 'quick add capture photo voice text inbox' },
        { name: 'Inbox', href: 'Inbox.dc.html', desc: 'Confirm what Diana caught', kw: 'inbox classify confirm captured' },
        { name: 'Homework', href: 'Work.dc.html', desc: 'One page to do the work \u2014 timer, steps, and Diana built in', kw: 'homework focus timer breakdown steps co-write reading test practice quiz visual tools ai help' },
      ]},
      { title: 'Study', color: 'var(--gl-green)', items: [
        { name: 'Flashcards', href: 'Flashcards.dc.html', desc: 'Spaced review decks', kw: 'flashcards cards spaced review deck memorize' },
        { name: 'Study artifacts', href: 'Study Artifacts.dc.html', desc: 'Generate guides, tests, cards', kw: 'study artifacts guide generate practice' },
        { name: 'Notes', href: 'Notes.dc.html', desc: 'Type, record, or photograph', kw: 'notes note type record photo' },
        { name: 'Study groups', href: 'Study Groups.dc.html', desc: 'Work together, Diana joins in', kw: 'study groups collaborate peers room' },
      ]},
      { title: 'Think · Proof · Future', color: 'var(--gl-cyan)', items: [
        { name: 'Wellness', href: 'Wellness.dc.html', desc: 'Mood, sleep, energy, reflection', kw: 'wellness think mood sleep energy health reflection' },
        { name: 'Portfolio', href: 'Portfolio.dc.html', desc: 'Your best work, evidence, progress', kw: 'portfolio proof work evidence progress' },
        { name: 'AP Command Center', href: 'AP Command Center.dc.html', desc: 'Exam countdowns, unit plan', kw: 'ap command center future exam countdown unit' },
      ]},
      { title: 'Account', color: 'var(--gl-gold)', items: [
        { name: 'Sharing', href: 'Sharing.dc.html', desc: 'Parent digest, teacher portal', kw: 'sharing parent teacher portal digest' },
        { name: 'AI history', href: 'AI History.dc.html', desc: 'Every AI call, in the open', kw: 'ai history log calls transparency' },
        { name: 'Export & privacy', href: 'Export and Privacy.dc.html', desc: 'Data inventory, export, delete', kw: 'export privacy data delete download' },
        { name: 'Sign out', href: 'Diana - Landing + Sign In.dc.html', desc: 'Return to the landing page', kw: 'sign out log out logout landing' },
      ]},
    ];
  }

  renderVals() {
    const q = this.state.query.trim().toLowerCase();
    const dir = this.DIR();
    let groups;
    if (q === '') {
      // Calm default: just quick nav, not the full tool catalog.
      groups = dir.filter((g) => g.title === 'Go to');
    } else {
      groups = dir
        .map((g) => ({
          ...g,
          items: g.items.filter((it) =>
            it.name.toLowerCase().includes(q) || it.desc.toLowerCase().includes(q) || (it.kw || '').includes(q)),
        }))
        .filter((g) => g.items.length > 0);
    }
    const total = groups.reduce((n, g) => n + g.items.length, 0);
    return {
      query: this.state.query,
      setQuery: this.setQuery,
      inputBorder: q ? 'var(--gl-cyan-25)' : 'var(--gl-border)',
      groups,
      isEmpty: q !== '' && total === 0,
      resultCountLabel: q === '' ? 'Quick links — or start typing to search everything.' : (total + (total === 1 ? ' result' : ' results') + ' for "' + this.state.query.trim() + '"'),
      ...this.avatarVals(),
    };
  }

  avatarVals() {
    const src = (() => { const p = localStorage.getItem('diana-profile-src') || ''; return p.startsWith('blob:') ? '' : p; })();
    const type = localStorage.getItem('diana-avatar-type') || 'none';
    const ox = parseFloat(localStorage.getItem('diana-photo-offset-x')) || 50;
    const oy = parseFloat(localStorage.getItem('diana-photo-offset-y')) || 50;
    const name = localStorage.getItem('diana-profile-name') || 'Grayson';
    const initials = name.trim().split(/\s+/).map((w) => w[0] || '').slice(0, 2).join('').toUpperCase() || 'G';
    return {
      profilePhotoSrc: src,
      photoObjectPosition: ox + '% ' + oy + '%',
      isAvatarUpload: type === 'upload',
      hasProfilePhoto: type === 'upload' && !!src,
      isAvatarBoy: type === 'boy',
      isAvatarGirl: type === 'girl',
      showInitialsFallback: type === 'none' || (type === 'upload' && !src),
      initials,
    };
  }
}
</script>
</body>
</html>
