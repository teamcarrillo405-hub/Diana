<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a1024"/>
    <circle cx="50" cy="50" r="26" fill="#29d0ff" opacity="0.16"/>
    <path d="M50 32 L58 46 L50 46 L58 68 L42 50 L50 50 Z" fill="#29d0ff"/>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&amp;family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,700;1,800&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --gl-bg-base:#04060f; --gl-bg-card:rgba(4,8,20,.72);
    --gl-cyan:#29d0ff; --gl-cyan-30:rgba(41,208,255,.3); --gl-cyan-25:rgba(41,208,255,.25); --gl-cyan-18:rgba(41,208,255,.18); --gl-cyan-14:rgba(41,208,255,.14); --gl-cyan-08:rgba(41,208,255,.08);
    --gl-green:#36e07a; --gl-green-30:rgba(54,224,122,.3);
    --gl-text-primary:#fff; --gl-text-muted:#aab8e0; --gl-text-dim:#7d88ad; --gl-text-overlay-60:rgba(200,218,255,.6);
    --gl-border:rgba(120,150,220,.18); --gl-bg-input:rgba(10,16,36,.8);
    --font-display:'Saira Condensed',sans-serif; --font-body:'Barlow Semi Condensed',sans-serif;
  }
  html,body{margin:0;background:var(--gl-bg-base);}*{box-sizing:border-box;}
  a{text-decoration:none;color:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(120,150,220,.3);border-radius:4px}
  ::placeholder{color:var(--gl-text-dim)}
</style>
</helmet>

<div style="width:100%;min-height:100vh;font-family:var(--font-body);color:var(--gl-text-primary);background:radial-gradient(1200px 600px at 80% -5%,rgba(41,208,255,.05),transparent 60%),var(--gl-bg-base)" data-screen-label="New Class">

  <!-- APP NAV -->
  <div style="position:relative;z-index:30;max-width:1440px;margin:0 auto;height:58px;display:flex;align-items:center;gap:22px;padding:0 22px;background:rgba(2,5,14,.72);border-bottom:1px solid rgba(41,208,255,.18);backdrop-filter:blur(20px)">
    <div style="display:flex;gap:8px">
      <a href="More.dc.html" title="Apps" style="width:34px;height:34px;border-radius:8px;background:rgba(120,150,220,.12);display:flex;align-items:center;justify-content:center;font-size:15px;color:#aab8e0">▦</a>
      <a href="Search.dc.html" title="Search" style="width:34px;height:34px;border-radius:8px;background:rgba(120,150,220,.12);display:flex;align-items:center;justify-content:center;font-size:14px;color:#aab8e0">⌕</a>
    </div>
    <div style="display:flex;align-items:center;gap:26px;margin-left:6px;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:#8b96bd">
      <a href="Student Lobby.dc.html" style="cursor:pointer;color:#8b96bd">Today</a><a href="Work.dc.html" style="cursor:pointer;color:#8b96bd">Work</a><a href="Classes.dc.html" style="cursor:pointer;color:#fff">Classes</a><a href="Calendar.dc.html" style="cursor:pointer;color:#8b96bd">Calendar</a><a href="Messages.dc.html" style="cursor:pointer;color:#8b96bd">Messages</a>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:16px">
      <a href="Settings.dc.html" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#29d0ff,#1a6cff);display:flex;align-items:center;justify-content:center;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:15px;color:#04080f;flex-shrink:0;cursor:pointer;border:2px solid rgba(41,208,255,.38)">G</a>
    </div>
  </div>

  <div style="max-width:1440px;margin:0 auto;padding:30px 34px 70px">
   <div style="max-width:640px;margin:0 auto">

    <a href="Classes.dc.html" style="display:inline-flex;align-items:center;gap:7px;margin-bottom:18px;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--gl-text-muted)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"></path></svg>Classes
    </a>

    <h1 style="margin:0;font-family:var(--font-display);font-style:italic;font-weight:800;font-size:34px;line-height:.94;text-transform:uppercase">Add a class</h1>
    <p style="margin:8px 0 26px;font-size:14px;color:var(--gl-text-overlay-60)">Set it up once — Diana files every assignment and quiz under the right class from here on.</p>

    <!-- Name -->
    <div style="margin-bottom:18px">
      <label style="display:block;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gl-text-dim);margin-bottom:8px">Class name</label>
      <input value="{{ name }}" onInput="{{ setName }}" placeholder="e.g. AP Biology" style="width:100%;padding:13px 15px;border-radius:11px;background:var(--gl-bg-input);border:1px solid {{ nameBorder }};color:#fff;font-size:16px;font-family:var(--font-body);outline:none"></input>
    </div>


    <!-- Teacher + Room -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
      <div>
        <label style="display:block;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gl-text-dim);margin-bottom:8px">Teacher (optional)</label>
        <input value="{{ teacher }}" onInput="{{ setTeacher }}" placeholder="e.g. Ms. Rivera" style="width:100%;padding:12px 14px;border-radius:11px;background:var(--gl-bg-input);border:1px solid var(--gl-border);color:#fff;font-size:15px;font-family:var(--font-body);outline:none"></input>
      </div>
      <div>
        <label style="display:block;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gl-text-dim);margin-bottom:8px">Room (optional)</label>
        <input value="{{ room }}" onInput="{{ setRoom }}" placeholder="e.g. B-214" style="width:100%;padding:12px 14px;border-radius:11px;background:var(--gl-bg-input);border:1px solid var(--gl-border);color:#fff;font-size:15px;font-family:var(--font-body);outline:none"></input>
      </div>
    </div>

    <!-- Period -->
    <div style="margin-bottom:26px">
      <label style="display:block;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gl-text-dim);margin-bottom:9px">When does it meet?</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <sc-for list="{{ periodChips }}" as="p" hint-placeholder-count="7">
          <div onClick="{{ p.onClick }}" style="padding:8px 14px;border-radius:9px;cursor:pointer;border:1.5px solid {{ p.border }};background:{{ p.bg }};font-family:var(--font-display);font-weight:700;font-size:13.5px;letter-spacing:.02em;text-transform:uppercase;color:{{ p.fg }}">{{ p.label }}</div>
        </sc-for>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px">
      <div onClick="{{ save }}" style="display:inline-flex;align-items:center;gap:9px;padding:13px 26px;border-radius:11px;background:{{ saveBg }};box-shadow:{{ saveShadow }};cursor:{{ saveCursor }}">
        <span style="font-family:var(--font-display);font-weight:800;font-size:16px;letter-spacing:.04em;text-transform:uppercase;color:{{ saveFg }}">Add class</span>
      </div>
      <a href="Classes.dc.html" style="padding:13px 20px;border-radius:11px;border:1px solid var(--gl-border);cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.03em;text-transform:uppercase;color:var(--gl-text-muted)">Cancel</a>
    </div>

    <sc-if value="{{ saved }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;align-items:center;gap:10px;margin-top:16px;padding:13px 15px;border-radius:11px;border:1px solid var(--gl-green-30);background:rgba(54,224,122,.12)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#36e07a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
        <span style="font-size:14px;color:var(--gl-text-secondary,#cdd6f2);font-weight:600">Added — {{ savedName }} is in your Classes now.</span>
        <a href="Classes.dc.html" style="margin-left:auto;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:#36e07a">View in Classes <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></a>
      </div>
    </sc-if>

   </div>
  </div>
</div>
<dc-import name="Agent Fab" hint-size="64px,64px" style="position:fixed;right:26px;bottom:26px;z-index:999"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { name: '', teacher: '', room: '', period: null, saved: false, savedName: '' };
  setName = (e) => this.setState({ name: e.target.value });
  setTeacher = (e) => this.setState({ teacher: e.target.value });
  setRoom = (e) => this.setState({ room: e.target.value });
  setPeriod = (v) => this.setState({ period: v });

  save = () => {
    const st = this.state;
    if (!(st.name.trim().length > 0)) return;
    this.setState({ saved: true, savedName: st.name.trim() });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ saved: false, name: '', teacher: '', room: '', period: null }), 2600);
  };
  componentWillUnmount() { clearTimeout(this._t); }

  renderVals() {
    const st = this.state;
    const PERIODS = ['1st', '2nd', '3rd', '4th', '5th', '6th', '7th'];
    const periodChips = PERIODS.map((p) => { const sel = st.period === p; return { label: p + ' period', onClick: () => this.setPeriod(p), border: sel ? 'var(--gl-cyan)' : 'var(--gl-border)', bg: sel ? 'var(--gl-cyan-14)' : 'transparent', fg: sel ? '#fff' : 'var(--gl-text-muted)' }; });

    const valid = st.name.trim().length > 0;
    return {
      name: st.name, setName: this.setName, nameBorder: st.name.trim() ? 'var(--gl-cyan-25)' : 'var(--gl-border)',
      teacher: st.teacher, setTeacher: this.setTeacher,
      room: st.room, setRoom: this.setRoom,
      periodChips,
      save: this.save, saved: st.saved, savedName: st.savedName,
      saveBg: valid ? 'var(--gl-cyan)' : 'var(--gl-cyan-14)',
      saveFg: valid ? '#04080f' : 'var(--gl-text-dim)',
      saveShadow: valid ? '0 0 24px rgba(41,208,255,.34)' : 'none',
      saveCursor: valid ? 'pointer' : 'not-allowed',
    };
  }
}
</script>
</body>
</html>
