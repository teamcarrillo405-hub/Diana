<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a1024"/>
    <circle cx="50" cy="50" r="26" fill="#29d0ff" opacity="0.16"/>
    <path d="M50 32 L58 46 L50 46 L58 68 L42 50 L50 50 Z" fill="#29d0ff"/>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&amp;family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,800&amp;display=swap" rel="stylesheet">
<style>html,body{margin:0;background:#04060f;}*{box-sizing:border-box;}</style>
</helmet>

<div style="width:390px;height:844px;position:relative;overflow:hidden;background:#04060f;font-family:'Barlow Semi Condensed',sans-serif;color:#fff;display:flex;flex-direction:column">

  <div style="display:flex;align-items:center;justify-content:space-between;height:42px;padding:0 16px;font-family:'Saira Condensed',sans-serif;font-weight:700;flex-shrink:0">
    <span style="font-size:14px">9:41</span>
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="17" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1" opacity=".5"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="2.5" stroke="#fff" stroke-opacity=".6"/><rect x="3" y="3" width="13" height="6" rx="1" fill="#fff"/></svg>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 16px;flex-shrink:0">
    <span style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-style:italic;font-size:19px;letter-spacing:.05em;text-transform:uppercase">June 2026</span>
    <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#29d0ff,#1a6cff);display:flex;align-items:center;justify-content:center;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;color:#04080f">G</div>
  </div>

  <!-- day strip -->
  <div style="display:flex;gap:8px;padding:10px 16px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid rgba(41,208,255,.14)">
    <sc-for list="{{ strip }}" as="d" hint-placeholder-count="7">
      <div style="flex-shrink:0;width:44px;text-align:center;padding:9px 0;border-radius:11px;background:{{ d.bg }};border:1px solid {{ d.border }}">
        <div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:{{ d.wdColor }}">{{ d.wd }}</div>
        <div style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:17px;color:{{ d.numColor }};margin-top:2px">{{ d.num }}</div>
        <div style="display:flex;justify-content:center;gap:2px;margin-top:4px;height:5px">
          <sc-for list="{{ d.dots }}" as="dot" hint-placeholder-count="1">
            <span style="width:4px;height:4px;border-radius:50%;background:{{ dot }}"></span>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>

  <!-- agenda list -->
  <div style="flex:1;overflow:auto;padding:14px 16px 10px">
    <sc-for list="{{ agendaGroups }}" as="g" hint-placeholder-count="4">
      <div style="margin-bottom:16px">
        <div style="font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:{{ g.tone }};margin-bottom:8px">{{ g.label }}</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="2">
            <div style="display:flex;align-items:center;gap:11px;border-radius:12px;border:1px solid rgba(120,150,220,.16);border-left:3px solid {{ it.color }};background:rgba(4,8,20,.7);padding:11px 13px">
              <div style="flex:1;min-width:0">
                <div style="font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:{{ it.color }}">{{ it.cls }}</div>
                <div style="font-size:14.5px;font-weight:700;color:#fff;margin-top:2px">{{ it.title }}</div>
              </div>
              <sc-if value="{{ it.isAp }}" hint-placeholder-val="{{ false }}">
                <span style="flex-shrink:0;padding:4px 9px;border-radius:6px;background:rgba(255,210,74,.14);border:1px solid rgba(255,210,74,.3);font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:#ffd24a">AP exam</span>
              </sc-if>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>

  <!-- bottom tab bar -->
  <div style="flex-shrink:0;height:64px;display:flex;align-items:center;justify-content:space-around;background:rgba(2,5,14,.92);border-top:1px solid rgba(41,208,255,.18);backdrop-filter:blur(20px);padding-bottom:6px">
    <a href="Student Lobby Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v10h14V10"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Today</span>
    </a>
    <a href="Work Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Work</span>
    </a>
    <a href="Classes Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Classes</span>
    </a>
    <a href="Calendar Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#29d0ff">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Calendar</span>
    </a>
    <a href="More Phone.dc.html" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:#5a648a">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="19" cy="12" r="1.6"></circle></svg>
      <span style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase">More</span>
    </a>
  </div>

</div>
<dc-import name="Agent Fab" bottom="96" hint-size="64px,64px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  renderVals() {
    const strip = [
      { wd: 'SUN', num: 14, dots: [], bg: 'rgba(255,255,255,.02)', border: 'rgba(120,150,220,.16)', wdColor: '#7d88ad', numColor: '#cdd6f2' },
      { wd: 'MON', num: 15, dots: ['#29d0ff','#29d0ff'], bg: 'rgba(41,208,255,.1)', border: '#29d0ff', wdColor: '#29d0ff', numColor: '#fff' },
      { wd: 'TUE', num: 16, dots: ['#29d0ff'], bg: 'rgba(255,255,255,.02)', border: 'rgba(120,150,220,.16)', wdColor: '#7d88ad', numColor: '#cdd6f2' },
      { wd: 'WED', num: 17, dots: [], bg: 'rgba(255,255,255,.02)', border: 'rgba(120,150,220,.16)', wdColor: '#7d88ad', numColor: '#cdd6f2' },
      { wd: 'THU', num: 18, dots: ['#ffd24a'], bg: 'rgba(255,255,255,.02)', border: 'rgba(120,150,220,.16)', wdColor: '#7d88ad', numColor: '#cdd6f2' },
      { wd: 'FRI', num: 19, dots: [], bg: 'rgba(255,255,255,.02)', border: 'rgba(120,150,220,.16)', wdColor: '#7d88ad', numColor: '#cdd6f2' },
      { wd: 'SAT', num: 20, dots: [], bg: 'rgba(255,255,255,.02)', border: 'rgba(120,150,220,.16)', wdColor: '#7d88ad', numColor: '#cdd6f2' },
    ];
    const agendaGroups = [
      { label: 'Today · June 15', tone: '#29d0ff', items: [
        { cls: 'Math', title: 'Unit 4 problem set', color: '#29d0ff' },
        { cls: 'English', title: 'Reading response', color: 'var(--gl-cyan)' },
      ]},
      { label: 'This week', tone: '#cdd6f2', items: [
        { cls: 'Science', title: 'Lab write-up — Titration', color: '#29d0ff' },
        { cls: 'History', title: 'Study guide — Unit 6', color: '#ffd24a' },
      ]},
      { label: 'Next week', tone: '#ffd24a', items: [
        { cls: 'AP Biology', title: 'AP Biology Exam', color: '#ffd24a', isAp: true },
        { cls: 'Athletics', title: 'Log workout reflection', color: '#5b7fff' },
      ]},
    ];
    return { strip, agendaGroups };
  }
}
</script>
</body>
</html>
